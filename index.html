<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gogó RMM - Marketing Geral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .aba-secao { display: none; }
        .aba-ativa { display: block; }
        .hidden-login { display: none !important; }
        .card-post { background: white; color: black; border-radius: 12px; width: 350px; min-height: 480px; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .carrossel { display: flex; overflow-x: auto; gap: 15px; padding: 15px; min-height: 180px; }
        .carrossel img { height: 140px; width: 140px; object-fit: cover; border-radius: 12px; border: 2px solid #334155; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="tela-login" class="h-screen flex flex-col items-center justify-center bg-slate-950">
        <div class="bg-slate-900 p-10 rounded-3xl w-full max-w-sm border border-slate-800 text-center shadow-2xl">
            <div class="w-24 h-24 bg-slate-800 rounded-full mx-auto mb-6 flex items-center justify-center border border-slate-700 overflow-hidden">
                <img src="" id="logo-login" class="w-full h-full object-cover hidden">
                <i id="icon-login" class="fas fa-store text-4xl text-blue-500"></i>
            </div>
            <h1 class="text-2xl font-bold uppercase text-white tracking-tighter">Marketing Geral</h1>
            <p class="text-blue-500 text-[10px] mb-8 font-bold tracking-widest">by studio Orrú</p>
            <div class="space-y-4 mb-8">
                <input type="text" id="user" placeholder="Usuário" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl outline-none text-white focus:border-blue-500">
                <input type="password" id="pass" placeholder="Senha" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl outline-none text-white focus:border-blue-500">
            </div>
            <button onclick="fazerLogin()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold transition-all transform active:scale-95 uppercase tracking-widest text-sm">Entrar no Sistema</button>
        </div>
    </div>

    <div id="main-app" class="h-screen flex hidden-login">
        <aside class="w-72 bg-slate-900 border-r border-slate-800 p-6 flex flex-col">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-slate-800 rounded-full mx-auto mb-3 border-2 border-blue-500/30 overflow-hidden flex items-center justify-center">
                    <img src="" id="logo-sidebar" class="w-full h-full object-cover hidden">
                    <i id="icon-sidebar" class="fas fa-store text-2xl text-blue-500"></i>
                </div>
                <h2 class="text-xs font-bold text-white uppercase tracking-widest">Marketing Geral</h2>
                <p class="text-blue-500 text-[9px] font-bold">by studio Orrú</p>
            </div>
            <nav class="space-y-2 flex-1">
                <button onclick="mudar('aba-galeria')" class="w-full text-left p-4 hover:bg-slate-800 rounded-xl transition text-sm font-bold"><i class="fas fa-images mr-3 text-blue-500"></i> Galeria</button>
                <button onclick="mudar('aba-criar')" class="w-full text-left p-4 hover:bg-slate-800 rounded-xl transition text-sm font-bold"><i class="fas fa-magic mr-3 text-green-500"></i> Criar e Enviar</button>
                <button onclick="mudar('aba-config')" id="btn-config" class="w-full text-left p-4 hover:bg-slate-800 rounded-xl transition text-sm font-bold hidden"><i class="fas fa-cog mr-3 text-slate-400"></i> Configurações</button>
            </nav>
            <button onclick="location.reload()" class="w-full text-left p-4 hover:bg-red-900/20 text-red-500 rounded-xl transition text-sm font-bold border-t border-slate-800 mt-4">
                <i class="fas fa-sign-out-alt mr-3"></i> Sair do App
            </button>
        </aside>

        <main class="flex-1 bg-slate-950 p-10 overflow-y-auto relative">
            
            <section id="aba-galeria" class="aba-secao aba-ativa">
                <h2 class="text-3xl font-bold mb-8">Gerenciador de Imagens</h2>
                <div class="grid grid-cols-2 gap-6 mb-10">
                    <button onclick="document.getElementById('up-cozinha-gal').click()" class="bg-slate-900 p-12 rounded-3xl border-2 border-dashed border-blue-500/30 hover:border-blue-500 transition">
                        <i class="fas fa-utensils text-3xl mb-3 text-blue-500"></i>
                        <p class="font-bold text-xs">CARREGAR COZINHA</p>
                    </button>
                    <button onclick="document.getElementById('up-bar-gal').click()" class="bg-slate-900 p-12 rounded-3xl border-2 border-dashed border-yellow-500/30 hover:border-yellow-500 transition">
                        <i class="fas fa-glass-martini-alt text-3xl mb-3 text-yellow-500"></i>
                        <p class="font-bold text-xs">CARREGAR BAR</p>
                    </button>
                </div>
                <input type="file" id="up-cozinha-gal" class="hidden" accept="image/*" multiple onchange="addCarrossel(this)">
                <input type="file" id="up-bar-gal" class="hidden" accept="image/*" multiple onchange="addCarrossel(this)">
                
                <h3 class="text-[10px] font-bold text-slate-500 mb-4 uppercase tracking-[0.2em]">Visualização Recente</h3>
                <div id="carrossel" class="carrossel bg-slate-900/50 rounded-2xl border border-slate-800">
                    <div class="p-10 text-slate-600 text-sm italic">Selecione fotos acima para visualizar aqui...</div>
                </div>
            </section>

            <section id="aba-criar" class="aba-secao">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-3xl font-bold">Mesa de Preparo</h2>
                    <div class="flex items-center gap-4">
                        <div class="flex gap-2 bg-slate-900 p-2 rounded-xl">
                            <a href="https://www.google.com" target="_blank" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-blue-600 transition"><i class="fab fa-google"></i></a>
                            <a href="https://www.facebook.com" target="_blank" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-blue-600 transition"><i class="fab fa-facebook-f"></i></a>
                            <a href="https://www.instagram.com" target="_blank" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-blue-600 transition"><i class="fab fa-instagram"></i></a>
                        </div>
                        <a href="https://gemini.google.com" target="_blank" class="bg-slate-800 p-2 rounded-xl hover:bg-blue-600 transition">
                            <svg viewBox="0 0 24 24" class="w-6 h-6 fill-white"><path d="M12 22C12 22 12 18 16 18C20 18 20 22 20 22M12 2C12 2 12 6 8 6C4 6 4 2 4 2M22 12C22 12 18 12 18 8C18 4 22 4 22 4M2 12C2 12 6 12 6 16C6 20 2 20 2 20M12 12C12 12 12 9 15 9C18 9 18 12 18 12C18 12 18 15 15 15C12 15 12 12 12 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </a>
                    </div>
                </div>

                <div class="flex flex-col xl:flex-row gap-12">
                    <div class="flex-1 space-y-6">
                        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                            <label class="block text-[10px] font-bold text-slate-500 mb-3 uppercase">Escolher Foto do Post:</label>
                            <div class="grid grid-cols-2 gap-3 mb-6">
                                <button onclick="document.getElementById('up-cozinha-post').click()" class="bg-blue-600/10 border border-blue-500/30 py-3 rounded-xl text-[10px] font-bold hover:bg-blue-600 transition">FOTO COZINHA</button>
                                <button onclick="document.getElementById('up-bar-post').click()" class="bg-yellow-500/10 border border-yellow-500/30 py-3 rounded-xl text-[10px] font-bold hover:bg-yellow-500 transition">FOTO BAR</button>
                            </div>
                            <input type="file" id="up-cozinha-post" class="hidden" accept="image/*" onchange="previewPost(this)">
                            <input type="file" id="up-bar-post" class="hidden" accept="image/*" onchange="previewPost(this)">
                            
                            <textarea id="texto-post" placeholder="Escreva sua legenda..." class="w-full h-44 bg-slate-950 p-5 rounded-xl text-white border border-slate-800 outline-none focus:border-blue-500 transition"></textarea>
                        </div>
                        <button onclick="abrirZap()" class="w-full bg-green-600 py-5 rounded-2xl font-bold uppercase tracking-widest text-sm hover:bg-green-500 transition shadow-lg shadow-green-900/20"><i class="fab fa-whatsapp mr-2 text-xl"></i> Enviar Legenda</button>
                    </div>

                    <div class="card-post p-8 mx-auto xl:mx-0">
                        <div class="flex justify-between items-center mb-6 border-b pb-4 border-slate-100">
                            <div class="flex items-center gap-3">
                                <img src="" class="logo-preview w-8 h-8 rounded-full hidden border border-slate-100">
                                <span class="font-extrabold text-sm tracking-tight">Gogó da Ema</span>
                            </div>
                            <i class="fas fa-ellipsis-h text-slate-300"></i>
                        </div>
                        <div class="bg-slate-50 h-72 rounded-xl flex flex-col items-center justify-center border-2 border-dashed border-slate-100 overflow-hidden shadow-inner">
                            <img id="img-preview" class="w-full h-full object-cover hidden">
                            <div id="msg-img" class="text-center p-4">
                                <i class="fas fa-image text-4xl text-slate-200 mb-3"></i>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Aguardando Imagem...</p>
                            </div>
                        </div>
                        <div class="mt-6 text-xs text-slate-700 leading-relaxed font-medium" id="preview-texto">Sua legenda aparecerá aqui...</div>
                    </div>
                </div>
            </section>

            <section id="aba-config" class="aba-secao">
                <h2 class="text-3xl font-bold mb-8 text-slate-500">Configurações</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 space-y-8">
                        <div>
                            <h3 class="text-[10px] font-bold text-blue-500 uppercase mb-4 tracking-widest">Identidade Visual</h3>
                            <button onclick="document.getElementById('up-logo').click()" class="w-full bg-slate-800 py-4 rounded-xl font-bold text-xs hover:bg-slate-700 transition"><i class="fas fa-upload mr-2"></i> CARREGAR LOGO OFICIAL</button>
                            <input type="file" id="up-logo" class="hidden" accept="image/*" onchange="setLogo(this)">
                        </div>
                        <button onclick="alert('Módulo de Usuários em breve!')" class="w-full bg-slate-800 py-4 rounded-xl font-bold text-xs uppercase">Gerenciar Usuários</button>
                    </div>
                    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 flex flex-col items-center justify-center">
                        <i class="fas fa-shield-alt text-4xl text-slate-800 mb-4"></i>
                        <button onclick="alert('Backup completo realizado!')" class="w-full bg-slate-800 py-4 rounded-xl font-bold text-xs uppercase tracking-widest">Backup do Sistema</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function fazerLogin() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            if (u === 'admin' && p === 'Gogo25anos#2026') {
                document.getElementById('btn-config').classList.remove('hidden');
                document.getElementById('tela-login').classList.add('hidden-login');
                document.getElementById('main-app').classList.remove('hidden-login');
            } else { alert('Acesso negado!'); }
        }

        function mudar(id) {
            document.querySelectorAll('.aba-secao').forEach(a => a.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function addCarrossel(input) {
            const container = document.getElementById('carrossel');
            if (container.innerText.includes("Selecione")) container.innerHTML = "";
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    container.prepend(img);
                };
                reader.readAsDataURL(file);
            });
        }

        function previewPost(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('img-preview').src = e.target.result;
                    document.getElementById('img-preview').classList.remove('hidden');
                    document.getElementById('msg-img').classList.add('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function setLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const src = e.target.result;
                    document.getElementById('logo-sidebar').src = src;
                    document.getElementById('logo-sidebar').classList.remove('hidden');
                    document.getElementById('icon-sidebar').classList.add('hidden');
                    document.getElementById('logo-login').src = src;
                    document.getElementById('logo-login').classList.remove('hidden');
                    document.getElementById('icon-login').classList.add('hidden');
                    document.querySelectorAll('.logo-preview').forEach(img => {
                        img.src = src;
                        img.classList.remove('hidden');
                    });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('texto-post').addEventListener('input', (e) => {
            document.getElementById('preview-texto').innerText = e.target.value || "Sua legenda aparecerá aqui...";
        });

        function abrirZap() {
            const t = document.getElementById('texto-post').value;
            if(!t) return alert("Escreva uma legenda primeiro!");
            window.open(`https://wa.me/?text=${encodeURIComponent("*GOGÓ DA EMA - NOVO POST*\n\n" + t)}`, '_blank');
        }
    </script>
</body>
</html>
