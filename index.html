<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMM - Gogó da Ema 25 Anos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .btn-gold { background-color: #fbbf24; color: #000; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; }
        .btn-gold:hover { background-color: #d97706; transform: scale(1.02); }
        .card-dark { background-color: #1e293b; border: 1px solid #334155; }
        .gallery-item { cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .gallery-item.active { border-color: #fbbf24; }
    </style>
</head>
<body>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 card-dark p-6 flex flex-col justify-between">
            <div>
                <div class="mb-10 text-center">
                    <h1 class="text-2xl font-bold text-yellow-500">Gogó da Ema</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-[0.3em]">25 Anos de Sabor</p>
                </div>
                <nav class="space-y-2">
                    <div class="flex items-center space-x-3 text-yellow-500 bg-slate-800 p-3 rounded-xl"><i class="fas fa-home"></i> <span>Mesa de Preparo</span></div>
                    <div class="flex items-center space-x-3 text-slate-500 p-3 opacity-50"><i class="fas fa-images"></i> <span>Minha Galeria</span></div>
                </nav>
            </div>
            <div class="p-4 border-t border-slate-700 bg-slate-900/50 rounded-xl">
                <p class="text-[10px] text-slate-500">Licença: <span class="text-green-500 font-bold">ATIVA</span></p>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 max-w-6xl mx-auto">
                
                <div class="card-dark p-8 rounded-[2rem] shadow-2xl border-t-4 border-yellow-500">
                    <h2 class="text-2xl font-bold mb-6">Mesa de Preparo</h2>
                    
                    <div class="space-y-6">
                        <div>
                            <p class="text-sm font-bold text-slate-400 mb-3 uppercase">1. Adicionar à Galeria</p>
                            <div class="flex gap-3" id="gallery-container">
                                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(event)">
                                <button onclick="document.getElementById('file-input').click()" class="w-24 h-24 border-2 border-dashed border-slate-600 rounded-2xl flex flex-col items-center justify-center text-slate-500 hover:border-yellow-500 hover:text-yellow-500 transition-all">
                                    <i class="fas fa-plus text-xl"></i>
                                    <span class="text-[10px] mt-1 font-bold">UPLOAD</span>
                                </button>
                                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=300" class="gallery-item w-24 h-24 object-cover rounded-2xl active" onclick="setPreview(this)">
                            </div>
                        </div>

                        <div>
                            <p class="text-sm font-bold text-slate-400 mb-2 uppercase">2. Legenda</p>
                            <textarea id="caption-box" oninput="syncText()" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 h-32 outline-none focus:border-yellow-500 transition-all" placeholder="Escreva aqui..."></textarea>
                        </div>

                        <button onclick="alert('✅ Sucesso! Post agendado para o Instagram do Gogó da Ema.')" class="w-full btn-gold p-5 rounded-2xl shadow-lg flex items-center justify-center space-x-3">
                            <i class="fas fa-calendar-check"></i>
                            <span class="uppercase tracking-widest">Agendar Publicação</span>
                        </button>
                    </div>
                </div>

                <div class="flex flex-col items-center">
                    <div class="w-[320px] h-[640px] bg-white rounded-[3rem] border-[10px] border-slate-900 shadow-2xl relative overflow-hidden">
                        <div class="p-4 border-b flex items-center space-x-2">
                            <div class="w-7 h-7 bg-yellow-500 rounded-full flex items-center justify-center text-[10px] font-bold text-black">G</div>
                            <span class="text-black text-xs font-bold">gogodaema_oficial</span>
                        </div>
                        <img id="main-preview" src="https://images.unsplash.com/photo-1544025162-d76694265947?w=800" class="w-full aspect-square object-cover">
                        <div class="p-4 text-black">
                            <div class="flex space-x-4 text-xl mb-2">
                                <i class="far fa-heart"></i>
                                <i class="far fa-comment"></i>
                            </div>
                            <p class="text-xs leading-relaxed"><span class="font-bold">gogodaema_oficial</span> <span id="text-preview">Legenda do Gogó...</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function handleImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const container = document.getElementById('gallery-container');
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'gallery-item w-24 h-24 object-cover rounded-2xl';
                    img.onclick = function() { setPreview(this); };
                    container.appendChild(img);
                    setPreview(img);
                };
                reader.readAsDataURL(file);
            }
        }

        function setPreview(el) {
            document.querySelectorAll('.gallery-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('main-preview').src = el.src;
        }

        function syncText() {
            const val = document.getElementById('caption-box').value;
            document.getElementById('text-preview').innerText = val || "Legenda do Gogó...";
        }
    </script>
</body>
</html>
