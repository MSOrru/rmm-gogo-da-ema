<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gogó da Ema - Marketing Geral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .aba-secao { display: none; }
        .aba-ativa { display: block; }
        .hidden-login { display: none !important; }
        .card-post { background: white; color: black; border-radius: 10px; width: 350px; min-height: 450px; position: relative; }
    </style>
</head>
<body>

    <div id="tela-login" class="h-screen flex flex-col items-center justify-center bg-slate-950">
        <div class="bg-slate-900 p-10 rounded-3xl w-full max-w-sm border border-slate-800 text-center shadow-2xl">
            <div class="w-24 h-24 bg-slate-800 rounded-full mx-auto mb-6 flex items-center justify-center border border-slate-700">
                <i class="fas fa-store text-4xl text-blue-500"></i>
            </div>
            
            <h1 class="text-2xl font-bold uppercase tracking-tighter text-white">Marketing Geral</h1>
            <p class="text-blue-500 text-xs mb-8 font-bold tracking-widest">by studio Orrú</p>
            
            <div class="text-left space-y-4 mb-8">
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Usuário</label>
                    <input type="text" id="user" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-white transition">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Senha</label>
                    <input type="password" id="pass" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 text-white transition">
                </div>
            </div>
            <button onclick="fazerLogin()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-white transition-all transform active:scale-95 shadow-lg shadow-blue-900/20">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="main-app" class="h-screen flex hidden-login">
        <aside class="w-72 bg-slate-900 border-r border-slate-800 p-6 flex flex-col">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-slate-800 rounded-full mx-auto mb-2 flex items-center justify-center border border-slate-700">
                    <i class="fas fa-store text-xl text-blue-500"></i>
                </div>
                <h2 class="text-sm font-bold uppercase text-white">Marketing Geral</h2>
                <p class="text-blue-500 text-[10px] font-bold">by studio Orrú</p>
            </div>
            <nav class="space-y-2 flex-1">
                <button onclick="mudar('aba-galeria')" class="w-full text-left p-4 hover:bg-slate-800 rounded-xl transition text-sm font-bold"><i class="fas fa-images mr-3 text-blue-500"></i> Galeria</button>
                <button onclick="mudar('aba-criar')" class="w-full text-left p-4 hover:bg-slate-800 rounded-xl transition text-sm font-bold"><i class="fas fa-paper-plane mr-3 text-green-500"></i> Criar e Enviar</button>
                <button onclick="mudar('aba-config')" id="btn-config" class="w-full text-left p-4 hover:bg-slate-800 rounded-xl transition text-sm font-bold hidden"><i class="fas fa-cog mr-3 text-slate-400"></i> Configurações</button>
            </nav>
            <div class="pt-6 border-t border-slate-800 text-[10px] text-slate-600 text-center uppercase font-bold">
                Validade: <span class="text-blue-500">31/12/2026</span>
            </div>
        </aside>

        <main class="flex-1 bg-slate-950 p-10 overflow-y-auto relative">
            <a href="https://www.google.com/search?q=gogo+da+ema+morumbi" target="_blank" class="absolute top-10 right-10 bg-slate-800 w-12 h-12 flex items-center justify-center rounded-full hover:bg-blue-600 transition shadow-lg">
                <i class="fab fa-google text-white"></i>
            </a>

            <section id="aba-galeria" class="aba-secao aba-ativa">
                <h2 class="text-3xl font-bold mb-8">Galeria Digital</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <a href="https://drive.google.com/drive/folders/1Uyc47w1v9Y_PVPWp0KQdxe6atQuqb7HL" target="_blank" class="bg-slate-900 p-10 rounded-3xl border-2 border-dashed border-slate-700 text-center hover:border-blue-500 transition">
                        <i class="fas fa-utensils text-4xl text-blue-500 mb-4"></i>
                        <p class="font-bold">COZINHA</p>
                    </a>
                    <a href="https://drive.google.com/drive/folders/1iRnxgaR8g-riNqJBbTByQ2TE2Bd4MNwi" target="_blank" class="bg-slate-900 p-10 rounded-3xl border-2 border-dashed border-slate-700 text-center hover:border-yellow-500 transition">
                        <i class="fas fa-glass-martini-alt text-4xl text-yellow-500 mb-4"></i>
                        <p class="font-bold">BAR</p>
                    </a>
                </div>
            </section>

            <section id="aba-criar" class="aba-secao">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold">Criar Postagem</h2>
                    <a href="https://gemini.google.com" target="_blank" class="bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-600 transition"><i class="fas fa-robot mr-2 text-blue-400"></i> GEMINI IA</a>
                </div>
                <div class="flex flex-col xl:flex-row gap-10">
                    <div class="flex-1 space-y-6">
                        <textarea id="texto-post" placeholder="Digite sua legenda..." class="w-full bg-slate-900 p-6 rounded-2xl h-48 border border-slate-800 text-white outline-none"></textarea>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="alert('Post salvo!')" class="bg-slate-700 py-4 rounded-2xl font-bold text-xs">SALVAR POST</button>
                            <button onclick="abrirZap()" class="bg-green-600 py-4 rounded-2xl font-bold text-xs">ENVIAR WHATSAPP</button>
                        </div>
                    </div>
                    <div class="card-post p-6 shadow-2xl mx-auto xl:mx-0">
                        <div class="flex justify-between items-center mb-4 border-b pb-2">
                            <span class="font-bold text-sm">Gogó da Ema</span>
                            <i class="fas fa-store text-blue-600"></i>
                        </div>
                        <div class="bg-slate-100 h-64 rounded flex flex-col items-center justify-center border-2 border-dashed border-slate-200">
                            <i class="fas fa-plus text-slate-300 text-2xl"></i>
                        </div>
                        <div class="mt-4 text-xs text-slate-800 font-medium" id="preview-texto">Sua legenda aqui...</div>
                    </div>
                </div>
            </section>

            <section id="aba-config" class="aba-secao">
                <h2 class="text-3xl font-bold mb-8 text-slate-400">Configurações</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                        <h3 class="font-bold mb-4 text-blue-500 uppercase text-xs">Usuários</h3>
                        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-sm">admin (Administrador)</div>
                    </div>
                    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 flex flex-col items-center">
                        <i class="fas fa-database text-4xl text-slate-700 mb-4"></i>
                        <button class="w-full bg-slate-800 py-3 rounded-xl text-[10px] font-bold">BACKUP</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function fazerLogin() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();

            if (u === 'admin' && p === 'Gogo25anos#2026') {
                document.getElementById('btn-config').classList.remove('hidden');
                document.getElementById('tela-login').classList.add('hidden-login');
                document.getElementById('main-app').classList.remove('hidden-login');
            } else if (u !== '' && p !== '') {
                // Login genérico para outros usuários (sem aba config)
                document.getElementById('tela-login').classList.add('hidden-login');
                document.getElementById('main-app').classList.remove('hidden-login');
            } else {
                alert('Usuário ou senha inválidos!');
            }
        }

        function mudar(id) {
            document.querySelectorAll('.aba-secao').forEach(a => a.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        document.getElementById('texto-post').addEventListener('input', function(e) {
            document.getElementById('preview-texto').innerText = e.target.value || "Sua legenda aqui...";
        });

        function abrirZap() {
            const t = document.getElementById('texto-post').value;
            window.open(`https://wa.me/?text=${encodeURIComponent(t)}`, '_blank');
        }
    </script>
</body>
</html>
