<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMM - Gastrobar Gogó da Ema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; }
        .status-card { background: #2d2d2d; border-radius: 8px; padding: 20px; margin-bottom: 15px; border-left: 5px solid #4CAF50; }
        .status-offline { border-left-color: #f44336; }
    </style>
</head>
<body class="p-5">
    <header class="mb-10 text-center">
        <h1 class="text-3xl font-bold text-yellow-500">Gogó da Ema - Painel RMM</h1>
        <p class="text-gray-400">Monitoramento e Gestão de Aplicativos - 25 Anos</p>
    </header>

    <div class="max-w-4xl mx-auto">
        <div class="status-card">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-semibold">Site Oficial</h2>
                    <p class="text-sm text-gray-400">gogodaema.com.br</p>
                </div>
                <span class="bg-green-900 text-green-300 px-3 py-1 rounded-full text-xs">ONLINE</span>
            </div>
        </div>

        <div class="status-card">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-semibold">App de Pedidos / Cardápio</h2>
                    <p class="text-sm text-gray-400">Versão 2.0.1</p>
                </div>
                <span class="bg-green-900 text-green-300 px-3 py-1 rounded-full text-xs">ONLINE</span>
            </div>
        </div>

        <div class="status-card status-offline">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-semibold text-red-400">App de Marketing</h2>
                    <p class="text-sm text-gray-400">Verificar Deployments do GitHub</p>
                </div>
                <span class="bg-red-900 text-red-300 px-3 py-1 rounded-full text-xs">ATENÇÃO</span>
            </div>
        </div>
    </div>

    <footer class="mt-10 text-center text-xs text-gray-500">
        &copy; 2026 Gastrobar Gogó da Ema - Sistema de Gestão RMM
    </footer>
</body>
</html>
