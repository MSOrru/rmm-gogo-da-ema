<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RMM - Gogo da Ema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .escondido { display: none; }
    </style>
</head>
<body>
    <div id="tela-login" class="h-screen flex items-center justify-center">
        <div class="bg-slate-800 p-8 rounded-xl w-full max-w-md text-center border border-slate-700">
            <h1 class="text-3xl font-bold text-yellow-500 mb-6">Gogó da Ema</h1>
            <button onclick="liberar()" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-lg">
                ENTRAR NO PAINEL
            </button>
        </div>
    </div>

    <div id="painel-rmm" class="h-screen flex escondido">
        <main class="flex-1 p-10 bg-slate-950 text-center">
            <h2 class="text-3xl font-bold mb-6 text-yellow-500">Sistema Ativado!</h2>
            <p class="text-xl text-slate-400">Pronto para as fotos do Gogó da Ema.</p>
        </main>
    </div>

    <script>
        function liberar() {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('painel-rmm').style.display = 'block';
        }
    </script>
</body>
</html>
